# ── AuraGenesis — docker-compose.yml ───────────────────────────────────────────────────
# Usage: docker compose up --build
# Requires Ollama running on host with: ollama pull llama3

services:
  aura:
    build: .
    container_name: aura_genesis
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - SENSE_INTERVAL=8
    volumes:
      - ./logs:/app/logs
      - ./known_faces:/app/known_faces
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
